name: CI

on:
 pull_request:
  branches: [main]

jobs:
 check:
  name: Lint, Typecheck & Test
  runs-on: ubuntu-latest

  steps:
   - name: Checkout code
     uses: actions/checkout@v4

   - name: Set up Node.js
     uses: actions/setup-node@v4
     with:
      node-version: 22
      cache: npm

   - name: Install dependencies
     run: npm ci

   - name: Lint
     run: npm run lint

   - name: Typecheck
     run: npm run typecheck

   - name: Test
     run: npm test
