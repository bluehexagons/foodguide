name: Deploy

on:
 push:
  branches: [main]

 # Allow manual trigger from the Actions tab
 workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
 contents: read
 pages: write
 id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. Do not cancel in-progress runs as we want to
# allow these deployments to complete.
concurrency:
 group: pages
 cancel-in-progress: false

jobs:
 # Run the same checks as CI before deploying
 check:
  name: Lint, Typecheck & Test
  runs-on: ubuntu-latest

  steps:
   - name: Checkout code
     uses: actions/checkout@v4

   - name: Set up Node.js
     uses: actions/setup-node@v4
     with:
      node-version: 22
      cache: npm

   - name: Install dependencies
     run: npm ci

   - name: Lint
     run: npm run lint

   - name: Typecheck
     run: npm run typecheck

   - name: Test
     run: npm test

 deploy-pages:
  name: Deploy to GitHub Pages
  needs: check
  runs-on: ubuntu-latest
  environment:
   name: github-pages
   url: ${{ steps.deployment.outputs.page_url }}

  steps:
   - name: Checkout code
     uses: actions/checkout@v4

   - name: Configure GitHub Pages
     uses: actions/configure-pages@v5

   - name: Upload Pages artifact
     uses: actions/upload-pages-artifact@v3
     with:
      path: html

   - name: Deploy to GitHub Pages
     id: deployment
     uses: actions/deploy-pages@v4

 notify-server:
  name: Trigger server deployment
  needs: check
  runs-on: ubuntu-latest
  # Only run if the webhook secret is configured
  if: vars.DEPLOY_WEBHOOK_URL != ''

  steps:
   - name: Send deploy webhook
     env:
      WEBHOOK_URL: ${{ vars.DEPLOY_WEBHOOK_URL }}
      WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
     run: |
      curl -fsS -X POST "$WEBHOOK_URL" \
        -H "Content-Type: application/json" \
        -H "X-Webhook-Secret: $WEBHOOK_SECRET" \
        -d "{\"ref\": \"$GITHUB_REF\", \"sha\": \"$GITHUB_SHA\"}" \
        --max-time 30
